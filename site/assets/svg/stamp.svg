<!-- Seema v3 · agent D · B9 batch stamp (used exactly once). Host sets color: chili #A93B26. -4deg rotation baked. JS writes the live batch no. into #stamp-batch-no. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
  <g id="stamp" transform="rotate(-4 180 100)">
    <rect id="stamp-frame" x="14" y="14" width="332" height="172" rx="18" stroke-width="5" stroke-dasharray="88 6 130 7 150 5 110 8 504"/>
    <rect id="stamp-frame-inner" x="30" y="30" width="300" height="140" rx="10" stroke-width="2"/>
    <text id="stamp-batch" x="177" y="88" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="28" font-weight="500" letter-spacing="6" fill="currentColor" stroke="none">BATCH <tspan id="stamp-batch-no">____</tspan></text>
    <path id="stamp-rule" d="M64 110L296 110" stroke-width="2" stroke-dasharray="1 7"/>
    <text id="stamp-fresh" x="173" y="156" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="44" font-weight="500" letter-spacing="14" fill="currentColor" stroke="none">FRESH</text>
  </g>
</svg>
