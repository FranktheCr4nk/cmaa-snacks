<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Cmaa — warmth, steaming bowl">
  <title>Cmaa — Warmth mark (steam rising from a bowl)</title>

  <!-- ===== Steam wisps (rising care), drawn first so bowl overlaps base ===== -->
  <g fill="none" stroke="#B5512E" stroke-width="5" stroke-linecap="round">
    <!-- left wisp: graceful S, tapering up -->
    <path d="M45 50 C40 43 49 38 45 30 C42 24 47 20 44.5 15" stroke="#D99A2B"/>
    <!-- center wisp (tallest): elegant double-curve with a soft top curl -->
    <path d="M60 48 C54 40 66 34 60 25 C56 19 61.5 14 59 9" />
    <!-- right wisp: mirror of left -->
    <path d="M75 50 C80 43 71 38 75 30 C78 24 73 20 75.5 15" stroke="#D99A2B"/>
  </g>

  <!-- ===== Bowl ===== -->
  <!-- bowl body: a wide, shallow vessel -->
  <path d="M24 60
           C24 60 30 92 60 92
           C90 92 96 60 96 60 Z"
        fill="#B5512E"/>
  <!-- contents / rim line (cream), the snack inside -->
  <path d="M26 61 C36 70 84 70 94 61" fill="none" stroke="#F4ECDD" stroke-width="4" stroke-linecap="round"/>
  <!-- bowl rim ellipse top edge -->
  <path d="M24 60 C24 53.5 96 53.5 96 60" fill="#8C3D22"/>
  <!-- base / foot -->
  <path d="M46 96 C46 96 50 102 60 102 C70 102 74 96 74 96 Z" fill="#8C3D22"/>
</svg>
