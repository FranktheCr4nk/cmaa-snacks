<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240" role="img" aria-label="cmaa — made with love">
  <title>cmaa — Friendly modern wordmark</title>
  <defs>
    <linearGradient id="t2swash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D99A2B"/>
      <stop offset="1" stop-color="#B5512E"/>
    </linearGradient>
  </defs>

  <!-- Rounded, friendly lowercase wordmark -->
  <text x="240" y="146" text-anchor="middle"
        font-family="Mulish, 'Helvetica Neue', Arial, sans-serif"
        font-size="128" font-weight="800" letter-spacing="-4" fill="#B5512E">cmaa</text>

  <!-- Gentle swash that cradles the two a's, connecting them warmly -->
  <path fill="none" stroke="url(#t2swash)" stroke-width="6.5" stroke-linecap="round"
        d="M 250 170 C 270 188 324 189 351 171"/>

  <!-- Tiny leaf accent budding from the swash terminal (warm, homemade) -->
  <g transform="translate(351,171) rotate(-40)">
    <path fill="#5E6B3B" d="M 0 0 C 7 -4 16 -3 21 4 C 14 8 4 7 0 0 Z"/>
    <path fill="none" stroke="#F4ECDD" stroke-width="1.3" stroke-linecap="round" d="M 3 0.5 C 8 0.5 14 2 18 4.2"/>
  </g>

  <!-- Sesame dot tittle sitting where an 'i' dot would, centred over the wordmark -->
  <circle cx="240" cy="50" r="4" fill="#E9B949"/>

  <!-- Descriptor -->
  <text x="240" y="202" text-anchor="middle"
        font-family="Mulish, 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="600" letter-spacing="6" fill="#8C3D22">HOMEMADE CHAKLI &amp; CHIVDA</text>
</svg>
