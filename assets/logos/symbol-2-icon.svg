    <use href="#c2petalA" transform="rotate(270 60 60)"/>
    <use href="#c2petalA" transform="rotate(300 60 60)"/>
    <use href="#c2petalA" transform="rotate(330 60 60)"/>
  </g>

  <!-- ===== Central chakli disc ===== -->
  <circle cx="60" cy="60" r="26.5" fill="#B5512E"/>
  <circle cx="60" cy="60" r="26.5" fill="none" stroke="#8C3D22" stroke-width="2"/>

