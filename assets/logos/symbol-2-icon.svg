  <title>Cmaa — Chakli-sun / marigold mark</title>
  <defs>
    <!-- Outer petal/ray: a clean teardrop pointing up, tip at y=10, base near disc -->
    <path id="c2petalA" d="M60 9
                           C65.6 18 67 27 64.2 34
                           C62.8 37.4 57.2 37.4 55.8 34
                           C53 27 54.4 18 60 9 Z"/>
    <!-- Inner petal: shorter, sits between outer petals, tucked toward disc -->
    <path id="c2petalB" d="M60 25
