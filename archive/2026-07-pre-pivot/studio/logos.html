<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cmaa — Logo Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500&family=Cormorant+Garamond:wght@500;600;700&family=Mulish:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--terracotta:#B5512E;--ink:#2E2017;--ink-soft:#5b4636;--cream:#F4ECDD;--paper:#FBF5E9;--gold:#E9B949;--kraft:#D9C2A3}
*{box-sizing:border-box}
body{margin:0;background:var(--cream);color:var(--ink);font-family:'Mulish',sans-serif;line-height:1.5;
  background-image:radial-gradient(circle at 12% 6%,rgba(217,194,163,.3),transparent 38%)}
.wrap{max-width:1180px;margin:0 auto;padding:40px 22px}
h1{font-family:'Fraunces',serif;font-size:clamp(34px,6vw,60px);font-weight:600;margin:0 0 6px}
h1 em{font-style:italic;color:var(--terracotta)}
.sub{color:var(--ink-soft);font-size:17px;max-width:680px;margin-bottom:8px}
.lane{font-family:'Fraunces',serif;font-size:24px;margin:38px 0 14px;padding-bottom:8px;border-bottom:2px solid rgba(46,32,23,.15)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:var(--paper);border:1px solid rgba(46,32,23,.12);border-radius:16px;overflow:hidden;box-shadow:0 14px 32px -24px rgba(46,32,23,.5)}
.stage{height:150px;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--cream)}
.stage.dark{background:var(--ink)}
.stage.kraft{background:var(--kraft)}
.stage svg{max-width:100%;max-height:120px;height:auto;width:auto}
.row{display:flex;border-top:1px solid rgba(46,32,23,.1)}
.row .stage{flex:1;height:110px;border-right:1px solid rgba(46,32,23,.1)}
.row .stage:last-child{border-right:none}
.row .stage svg{max-height:78px}
.meta{padding:14px 16px}
.meta h3{font-family:'Fraunces',serif;font-size:19px;margin:0 0 4px}
.meta .id{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--terracotta)}
.meta p{font-size:12.5px;color:var(--ink-soft);margin:6px 0 0}
.favchip{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--ink-soft)}
.favchip .fav{width:24px;height:24px;background:var(--cream);border-radius:6px;border:1px solid rgba(46,32,23,.15);display:flex;align-items:center;justify-content:center;overflow:hidden}
.favchip .fav svg{max-width:18px;max-height:18px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Cmaa — <em>Logo Studio</em></h1>
  <p class="sub">Nine refined logo concepts across three families. Each shown full-colour, reversed on dark, and (where relevant) as a small icon to test favicon-scale. Crafted on the Kitchen Warmth palette with Fraunces typography and the chakli-spiral motif.</p>
  <div id="lanes"></div>
</div>
<script>
const L='../assets/logos/';
const LANES=[
 {title:'Family A — Typographic wordmarks & monogram', manifest:'manifest-typo.json'},
 {title:'Family B — Heritage emblems & seals', manifest:'manifest-emblem.json'},
 {title:'Family C — Symbols & illustrative marks', manifest:'manifest-symbol.json'},
];
async function inject(el, file){ try{ const r=await fetch(L+file); el.innerHTML=await r.text(); }catch(e){ el.textContent='⚠'; } }
(async function(){
  const root=document.getElementById('lanes');
  for(const lane of LANES){
    const h=document.createElement('div');h.className='lane';h.textContent=lane.title;root.appendChild(h);
    const grid=document.createElement('div');grid.className='grid';root.appendChild(grid);
    let items=[];try{items=await (await fetch(L+lane.manifest)).json();}catch(e){}
    items.forEach(it=>{
      const card=document.createElement('div');card.className='card';
      const fav=it.files.icon?`<div class="favchip"><span class="fav" data-svg="${it.files.icon}"></span> icon / favicon</div>`:'';
      card.innerHTML=`<div class="stage" data-svg="${it.files.primary}"></div>
        <div class="row">
          <div class="stage dark" data-svg="${it.files.rev||it.files.primary}"></div>
          <div class="stage kraft" data-svg="${it.files.mono||it.files.primary}"></div>
        </div>
        <div class="meta"><div class="id">${it.id}</div><h3>${it.name}</h3><p>${it.concept}</p>${fav}</div>`;
      grid.appendChild(card);
    });
  }
  document.querySelectorAll('[data-svg]').forEach(el=>inject(el, el.dataset.svg));
})();
</script>
</body>
</html>
