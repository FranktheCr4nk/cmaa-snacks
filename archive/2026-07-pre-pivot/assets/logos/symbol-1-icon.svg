<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Cmaa — Maa mark">
  <title>Cmaa — The Maa mark</title>
  <!-- Warm enclosing ring: the embrace -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#B5512E" stroke-width="3.2"/>
  <g fill="none" stroke="#2E2017" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Hair bun crown -->
    <path d="M44.5 41 C46.5 30.5 73.5 30.5 75.5 41" stroke="#8C3D22"/>
    <circle cx="60" cy="30.5" r="6.6" fill="#8C3D22" stroke="none"/>
    <!-- Head / face contour: forehead, cheek, chin, jaw -->
    <path d="M44.5 42
             C42 52 42 60 44.5 67
             C47.5 76 53 81 60 81
             C67 81 72.5 76 75.5 67
             C78 60 78 52 75.5 42"/>
    <!-- Hair sweeping down each side, framing the face -->
    <path d="M44.5 42 C40 49 39.5 60 42 70" stroke="#8C3D22"/>
    <path d="M75.5 42 C80 49 80.5 60 78 70" stroke="#8C3D22"/>
    <!-- Knowing half-smile -->
    <path d="M52 69 C56 73 64 73 68 69"/>
    <!-- Soft brow / eye suggestion (single confident stroke each) -->
    <path d="M50.5 56.5 C52.5 54.5 55.5 54.5 57.5 56.5" stroke-width="3.4"/>
    <path d="M62.5 56.5 C64.5 54.5 67.5 54.5 69.5 56.5" stroke-width="3.4"/>
  </g>
  <!-- Bindi -->
  <circle cx="60" cy="47.5" r="3.2" fill="#B5512E"/>
</svg>
